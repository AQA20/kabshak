name: Deploy ASP.NET Web Forms to SmarterASP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v3

    - name: Restore NuGet Packages
      run: nuget restore kabsh.sln

    - name: Inject Production Database Password
      shell: powershell
      run: |
        $path = "Web\Web.Release.config"
        $content = [System.IO.File]::ReadAllText($path)
        $content = $content.Replace("YOUR_DB_PASSWORD", "${{ secrets.DB_PASSWORD }}")
        [System.IO.File]::WriteAllText($path, $content)

    - name: Build and Publish Web Project
      run: |
        msbuild Web\Web.csproj /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=false /p:AutoParameterizationWebConfigConnectionStrings=false

    - name: Copy asset files to Publish directory
      shell: powershell
      run: |
        if (Test-Path "Web\assets") {
            New-Item -ItemType Directory -Force -Path "Web\obj\Release\Package\PackageTmp\assets"
            Copy-Item -Path "Web\assets\*" -Destination "Web\obj\Release\Package\PackageTmp\assets" -Recurse -Force
            Write-Output "Successfully copied Web\assets to Publish directory."
        } else {
            Write-Warning "Web\assets directory not found."
        }

    - name: List published files
      continue-on-error: true
      run: Get-ChildItem "Web\obj\Release\Package\PackageTmp" -Recurse | Select-Object -First 30

    - name: FTP Deploy to SmarterASP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: win8120.site4now.net
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./Web/obj/Release/Package/PackageTmp/
        server-dir: /site1/
        exclude: |
          **/.git*
          **/.git*/**
          assets/images/products/**
          assets/images/categories/**
          assets/images/brands/**
          assets/images/orders/**
          assets/images/sliders/**
          assets/images/banners/**
